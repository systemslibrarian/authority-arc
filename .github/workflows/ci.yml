name: CI - Typecheck + Lint + Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # PREFLIGHT: Fast sanity checks — install, typecheck, lint
  # Catches the most common failures in <60s before burning CI minutes.
  # ═══════════════════════════════════════════════════════════════════════════
  preflight:
    name: "Preflight: Typecheck + Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  # ═══════════════════════════════════════════════════════════════════════════
  # GATE 1: Tests — Vitest, all files
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: "Gate 1: Tests"
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  # ═══════════════════════════════════════════════════════════════════════════
  # GATE 2: Build — confirms the production build compiles
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: "Gate 2: Production build"
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ═══════════════════════════════════════════════════════════════════════════
  # GATE 3: Audit — npm audit for high/critical advisories
  # ═══════════════════════════════════════════════════════════════════════════
  audit:
    name: "Gate 3: Dependency audit"
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

  # ═══════════════════════════════════════════════════════════════════════════
  # Required status check — preflight + all gates must pass
  # ═══════════════════════════════════════════════════════════════════════════
  all-gates:
    name: "All CI Gates"
    needs: [preflight, test, build, audit]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: always()
    steps:
      - name: Check gate results
        run: |
          FAILED=0
          if [[ "${{ needs.preflight.result }}" != "success" ]]; then
            echo "❌ Preflight (Typecheck + Lint) failed"
            FAILED=1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Gate 1 (Tests) failed"
            FAILED=1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Gate 2 (Build) failed"
            FAILED=1
          fi
          if [[ "${{ needs.audit.result }}" != "success" ]]; then
            echo "⚠️  Gate 3 (Audit) reported findings (non-blocking)"
          fi
          if [[ "$FAILED" == "1" ]]; then
            echo "❌ Critical CI gates failed"
            exit 1
          fi
          echo "✅ All critical CI gates passed"
